name: Karate CI - @automation-api

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  karate-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas con tag @automation-api
        run: mvn clean test -Dkarate.options="--tags @automation-api" -Dkarate.env=main

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports-main
          path: target/karate-reports/
          retention-days: 15